name: Deploy to Cloud Run

on:
  push:
    branches: [ "main" ]

permissions:
  contents: read
  id-token: write

env:
  PROJECT_ID: focus-strand-482019-q2
  REGION: us-central1
  SERVICE: lab02-spring

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Auth to Google Cloud (OIDC)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/324713611262/locations/global/workloadIdentityPools/github-pool-v2/providers/github-provider-v2
          service_account: sa-github-deployer@focus-strand-482019-q2.iam.gserviceaccount.com

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT_ID }}

      - name: Deploy (build from source)
        run: |
          cd l02-cloud-run-spring
          gcloud run deploy "${SERVICE}" \
            --source . \
            --region "${REGION}" \
            --allow-unauthenticated \
            --quiet
